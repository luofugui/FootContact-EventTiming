default:
  device: cuda
  seed: 0
  output_dir: results/underpressure_event_time

data:
  dataset: underpressure
  data_root: /media/volume/Jeff/project/footformer_workspace/UnderPressure/dataset
  # Model input: 1s pose window sampled to 30fps.
  input_fps: 30
  # Preprocessed UnderPressure files are synchronized to the insole/contact
  # timeline. The sync.csv frame counts show this is the 100Hz insole timeline.
  label_fps: 100
  window_sec: 1.0
  window_stride_sec: 0.1
  pose_key: positions
  contact_key: contacts
  event_names:
    - left_contact
    - left_departure
    - right_contact
    - right_departure
  train_val_split: 0.9
  max_cached_sequences: 64
  preload: true
  share_memory: true

model:
  num_joints: 23
  joint_dim: 4
  hidden_dim: 512
  num_layers: 4
  num_heads: 8
  mlp_dim: 1024
  dropout: 0.2
  pose_embedder: gcn
  transformer: multi
  pos: learnable
  # Kept for compatibility; the direct-time model does not use a temporal mask.
  temporal_window: 2

training:
  batch_size: 512
  dataloader_workers: 8
  prefetch_factor: 4
  epochs: 60
  lr: 0.0002
  weight_decay: 0.01
  patience: 8
  time_loss: smooth_l1
  lambda_time: 1.0
  lambda_presence: 1.0
